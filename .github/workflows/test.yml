name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: enrollment-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: enrollment-service

      - name: Run unit tests
        run: npm run test:unit
        working-directory: enrollment-service

  component:
    runs-on: ubuntu-latest
    needs: unit
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: enrollment-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: enrollment-service

      - name: Run component tests
        env:
          MONGO_URL: mongodb://127.0.0.1:27017
        run: npm run test:component
        working-directory: enrollment-service

  api:
    runs-on: ubuntu-latest
    needs: component
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: enrollment-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: enrollment-service

      - name: Run API tests
        env:
          MONGO_URL: mongodb://127.0.0.1:27017
        run: npm run test:api
        working-directory: enrollment-service
